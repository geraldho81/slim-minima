name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          # Build never connects to the DB (lazy proxy), but Auth.js wants a
          # secret present at build time.
          AUTH_SECRET: ci-build-placeholder-secret-do-not-use
